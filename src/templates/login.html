<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Car Rental - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; width: 420px; }
        h1 { color: #fff; text-align: center; font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #aaa; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .flash { padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .flash.error { background: rgba(255,0,0,0.15); color: #ff6b6b; border: 1px solid rgba(255,0,0,0.3); }
        .flash.success { background: rgba(0,255,0,0.1); color: #51cf66; border: 1px solid rgba(0,255,0,0.2); }
        label { color: #ccc; font-size: 14px; display: block; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; background: rgba(255,255,255,0.08); color: #fff; font-size: 15px; margin-bottom: 18px; outline: none; }
        input:focus { border-color: #667eea; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .link { text-align: center; margin-top: 20px; color: #aaa; font-size: 14px; }
        .link a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="page-title">🚗 Elite Car Rental</h1>
        <p class="subtitle">Sign in to your account</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}" id="flash-message">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST" id="login-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <button type="submit" id="login-btn">Sign In</button>
        </form>
        <p class="link">Don't have an account? <a href="/signup" id="signup-link">Sign Up</a></p>
    </div>
</body>
</html>
