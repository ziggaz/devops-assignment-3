<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registry</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .form-section { background: #f9f9f9; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input[type="text"], input[type="email"] { width: calc(100% - 22px); padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .delete-btn { background: #dc3545; }
        .delete-btn:hover { background: #c82333; }
        .edit-form { display: inline-block; margin-left: 10px; }
        .edit-input { width: 120px !important; display: inline-block !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="main-header">User Registry Dashboard</h1>

        <div class="form-section">
            <h2 id="add-user-header">Add New User</h2>
            <form id="add-user-form" action="/add" method="POST">
                <input type="text" id="name-input" name="name" placeholder="Full Name" required>
                <input type="email" id="email-input" name="email" placeholder="Email Address" required>
                <button type="submit" id="submit-btn">Add User</button>
            </form>
        </div>

        <div class="form-section">
            <h2>Search Users</h2>
            <form id="search-form" action="/" method="GET">
                <input type="text" id="search-input" name="search" placeholder="Search by Name" value="{{ search_query }}">
                <button type="submit" id="search-btn">Search</button>
                <a href="/" id="clear-search-btn" style="display:inline-block; margin-left: 10px; padding: 10px 15px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px;">Clear</a>
            </form>
        </div>

        <h2 id="user-list-header">Registered Users</h2>
        <table id="users-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr class="user-row" id="user-row-{{ user[0] }}">
                    <td>{{ user[0] }}</td>
                    <td class="user-name">{{ user[1] }}</td>
                    <td class="user-email">{{ user[2] }}</td>
                    <td>
                        <a href="/delete/{{ user[0] }}" class="delete-btn" id="delete-btn-{{ user[0] }}" style="display:inline-block; padding: 5px 10px; color: white; text-decoration: none; border-radius: 3px;">Delete</a>
                        <form action="/edit/{{ user[0] }}" method="POST" class="edit-form">
                            <input type="text" name="new_name" placeholder="New Name" class="edit-input" id="edit-input-{{ user[0] }}" required>
                            <button type="submit" id="edit-btn-{{ user[0] }}" style="padding: 5px 10px; background: #28a745;">Edit</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" id="no-users-msg" style="text-align: center;">No users found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
