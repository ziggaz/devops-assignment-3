version: '3.8'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src
  
  test:
    image: joyzoursky/python-chromedriver:3.9
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - APP_URL=http://web:5000
    command: >
      sh -c "pip install -r requirements.txt && pytest -v tests/"
    depends_on:
      - web
